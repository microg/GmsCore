apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

android {
    namespace "com.google.android.gms.payments"

    compileSdkVersion androidCompileSdk
    buildToolsVersion "$androidBuildVersionTools"

    buildFeatures {
        aidl = true
        compose = true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.10'
    }

    defaultConfig {
        versionName version
        minSdkVersion androidMinSdk
        targetSdkVersion androidTargetSdk
    }

    compileOptions {
        sourceCompatibility = 1.8
        targetCompatibility = 1.8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    api project(':play-services-base')
    api project(':play-services-basement')
    implementation project(':play-services-base-core')
    implementation project(':play-services-core-proto')

    implementation "com.squareup.wire:wire-runtime:$wireVersion"
    implementation "com.squareup.wire:wire-grpc-client:$wireVersion"
    // Compose
    def composeBom = platform('androidx.compose:compose-bom:2024.04.00')
    implementation composeBom
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    implementation 'androidx.activity:activity-compose:1.8.2'
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.5.1"
    implementation "io.coil-kt:coil-compose:2.4.0"
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.4.1"


    implementation "com.google.guava:guava:$guavaVersion"
    implementation "com.google.crypto.tink:tink-android:$tinkVersion"
    annotationProcessor project(':safe-parcel-processor')
}
