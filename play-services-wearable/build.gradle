apply plugin: 'com.android.library'

dependencies {
    implementation 'com.github.HyperCriSiS:wearos-support:1.0.0'
    implementation 'com.google.android.gms:play-services-wearable:18.0.0'
    implementation 'com.google.android.gms:play-services-base:18.0.1'
    implementation 'com.google.android.gms:play-services-tasks:18.0.2'
}

android {
    compileSdkVersion 31
    defaultConfig {
apply plugin: 'com.android.library'
apply plugin: 'com.squareup.wire'
apply plugin: 'maven-publish'
apply plugin: 'signing'

android {
    namespace "com.google.android.gms.wearable"

    compileSdkVersion androidCompileSdk
    buildToolsVersion "$androidBuildVersionTools"

    buildFeatures {
        aidl = true
    }

    defaultConfig {
        versionName version
        minSdkVersion androidMinSdk
        targetSdkVersion androidTargetSdk
    }

    compileOptions {
        sourceCompatibility = 1.8
        targetCompatibility = 1.8
    }

    lintOptions {
        disable 'InvalidPackage'
    }
}

wire {
    java {

    }
}

apply from: '../gradle/publish-android.gradle'

description = 'microG implementation of play-services-wearable'

dependencies {
    implementation "com.squareup.wire:wire-runtime:$wireVersion"

    // Dependencies from play-services-wearable:17.1.0
    api "androidx.core:core:1.0.0"
    api project(':play-services-base')
    api project(':play-services-basement')
    api project(':play-services-tasks')
}
