apply plugin: 'com.android.library'
apply plugin: 'com.squareup.wire'
apply plugin: 'maven-publish'
apply plugin: 'signing'

android {
    namespace "com.google.android.gms.wearable"

    compileSdkVersion androidCompileSdk
    buildToolsVersion "$androidBuildVersionTools"

    buildFeatures {
        aidl = true
    }

    defaultConfig {
        versionName version
        minSdkVersion androidMinSdk
        targetSdkVersion androidTargetSdk
    }

    compileOptions {
        sourceCompatibility = 1.8
        targetCompatibility = 1.8
    }

    lintOptions {
        disable 'InvalidPackage'
    }
}

wire {
    java {

    }
}

apply from: '../gradle/publish-android.gradle'

description = 'microG implementation of play-services-wearable'

dependencies {
    implementation "com.squareup.wire:wire-runtime:$wireVersion"

    // Dependencies from play-services-wearable:17.1.0
    api "androidx.core:core:1.0.0"
    api project(':play-services-base')
    api project(':play-services-basement')
    api project(':play-services-tasks')
/*
 * SPDX-FileCopyrightText: 2025 microG Project Team
 * SPDX-License-Identifier: Apache-2.0
 */

apply plugin: 'com.android.library'

android {
    compileSdkVersion androidCompileSdkVersion
    buildToolsVersion = androidBuildVersionTools

    defaultConfig {
        minSdkVersion androidMinSdkVersion
        targetSdkVersion androidTargetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    lintOptions {
        disable 'MissingTranslation'
    }
}

dependencies {
    implementation project(':play-services-base')
    implementation project(':play-services-basement')
    implementation project(':play-services-tasks')
    implementation project(':safe-parcel-processor')
    annotationHandler project(':safe-parcel-processor')
}
}
