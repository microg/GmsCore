option java_package = "org.microg.gms.wearable.proto";
option java_outer_classname = "WearableProto";

message AccountMatchingMessage {
    enum Type {
        //UNRECOGNIZED = -1;
        UNSPECIFIED = 0;
        GET_ACCOUNTS = 1;
        ACCOUNTS_RESPONSE = 2;
        REMOVE_ACCOUNTS = 3;
        REMOVE_ACCOUNTS_CONFIRM = 4;
        CANCEL = 5;
        REMOTE_ERROR = 6;
    }

    optional int32 type = 1;
    repeated AccountMatchingEntry entries = 2;
    optional string exceptionMessage = 3;
}

message AccountMatchingEntry {
    optional string nameMaybe = 1; // Not sure here
    optional string id = 2;
}

message AckAsset {
    optional string digest = 1;
}

message AppKey {
    optional string packageName = 1;
    optional string signatureDigest = 2;
}

message AppKeys {
    repeated AppKey appKeys = 1;
}

message Asset {
    // cannot find what other fields is
    // maybe deprecated and
    // not used anymore in new google gms
    optional string digest = 4;
}

message AssetEntry {
    optional string key = 1;
    optional Asset value = 2;
    optional int32 unknown3 = 3;
}

message CapabilityFilters {
    repeated CapabilityFilterEntry entries = 1;
}

message CapabilityFilterEntry {
    optional string nameMaybe = 1;
}

message ChannelControlRequest {
    enum Type {
        CHANNEL_CONTROL_OPEN = 1;
        CHANNEL_CONTROL_OPEN_ACK = 2;
        CHANNEL_CONTROL_CLOSE = 3;
    }

    optional int32 type = 1;
    optional sfixed64 channelId = 2;
    optional bool fromChannelOperator = 3;
    optional string packageName = 4;
    optional string signatureDigest = 5;
    optional string path = 6;
    optional int32 closeErrorCode = 7;
    optional bool isReliable = 8;
}

message ChannelDataAckRequest {
    optional ChannelDataHeader header = 1;
    optional bool finalMessage = 2;
}

message ChannelDataHeader {
    optional sfixed64 channelId = 1;
    optional bool fromChannelOperator = 2;
    optional int64 requestId = 3;
}

message ChannelDataRequest {
    optional ChannelDataHeader header = 1;
    optional bytes payload = 2;
    optional bool finalMessage = 3;
}

message ChannelRequest {
    optional ChannelControlRequest channelControlRequest = 2;
    optional ChannelDataRequest channelDataRequest = 3;
    optional ChannelDataAckRequest channelDataAckRequest = 4;
    optional int32 version = 6;
    optional int32 origin = 7;
}

message Connect {
    optional string id = 1;
    optional string name = 2;
    optional int64 peerAndroidId = 3;
    optional int32 unknown4 = 4; // Always has value 3
    optional int32 peerVersion = 5;
    optional int32 peerMinimumVersion = 6;
    optional string networkId = 7;
    optional string packageName = 8;
    optional bool migrating = 9;
    optional string migratingFromNodeId = 10;
    optional int32 androidSdkVersion = 11;
}

message ConnectionRestrictions {
    repeated ConnectionRestrictionEntry entries = 1;
}

message ConnectionRestrictionEntry {
    optional string packageName = 1;
    optional DataItemFilters dataItemFilters = 2;
    optional CapabilityFilters capabilityFilters = 3;
}

message ControlMessage {
    enum Type {
        UNKNOWN = 1;
        TERMINATE_ASSOCIATION = 2;
        SUSPEND_SYNC = 3;
        RESUME_SYNC = 4;
        MIGRATION_FAILED = 5;
        ACCOUNT_MATCHING = 6;
        MIGRATION_CANCELLED = 7;
    }

    optional int32 type = 1;
    optional AccountMatchingMessage accountMatching = 2;
}

message DataItemFilters {
    repeated DataItemFilterEntry entries = 1;
}

message DataItemFilterEntry {
    optional int32 filterType = 1;
    optional string uri = 2;
}

message EncryptionHandshake {
    optional bytes cryptoNegotiationResponse = 1; // Unsure
    optional bytes resumeBytes = 2; // Unsure
    optional bool unknown3 = 3;
    optional int32 unknown4 = 4;
}

message FetchAsset {
    optional string packageName = 1;
    optional string assetName = 2;
    optional bool permission = 3;
    optional string signatureDigest = 4;
}

message FilePiece {
    optional string fileName = 1;
    optional bool finalPiece = 2;
    optional bytes piece = 3;
    optional string digest = 4;
}

message Heartbeat {

}

message MessagePiece {
    optional bytes data = 1;
    optional string digest = 2;
    optional int32 thisPiece = 3;
    optional int32 totalPieces = 4;
    optional int32 queueId = 5;
}

message Request {
    optional int32 requestId = 1;
    optional string packageName = 2;
    optional string signatureDigest = 3;
    optional string targetNodeId = 4;
    optional int32 unknown5 = 5; // always has to be 0
    optional string path = 6;
    optional bytes rawData = 7;
    optional string sourceNodeId = 8;
    optional ChannelRequest request = 9;
    optional int32 generation = 10;
    optional bool requiresResponse = 13;
    optional int32 senderRequestId = 14;
    optional int32 priority = 15;
}

message RootMessage {
    optional SetAsset setAsset = 4;
    optional AckAsset ackAsset = 5;
    optional FetchAsset fetchAsset = 6;
    optional Connect connect = 7;
    optional SyncStart syncStart = 8;
    optional SetDataItem setDataItem = 9;
    optional Request rpcRequest = 10;
    optional Heartbeat heartbeat = 11;
    optional FilePiece filePiece = 12;
    optional bool hasAsset = 13;
    optional Request channelRequest = 16;
    optional EncryptionHandshake e2eHandshake = 17;
    optional Request rpcServiceRequest = 18;
    // This is probably not needed?
    // optional IosMultiAppAuth iosMultiAppAuth = 19;
    optional ControlMessage controlMessage = 20;
}

message SetAsset {
    optional string digest = 1;
    optional bytes data = 2;
    optional AppKeys appkeys = 3;
}

message SetDataItem {
    optional string packageName = 1;
    optional string uri = 2;
    repeated string unknown3 = 3;
    optional bytes data = 4;
    optional int64 seqId = 5;
    optional bool deleted = 6;
    optional string source = 7;
    repeated AssetEntry assets = 8;
    optional string signatureDigest = 9;
    optional int64 lastModified = 10;
}

message SyncStart {
    optional int64 receivedSeqId = 1;
    repeated SyncTableEntry syncTable = 2;
    optional int32 version = 3;
    optional ConnectionRestrictions restrictions = 4;
}

message SyncTableEntry {
    optional string key = 1;
    optional int64 value = 2;
}
