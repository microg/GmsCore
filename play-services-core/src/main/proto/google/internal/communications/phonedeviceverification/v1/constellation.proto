// TelephonyInfoContainer for ClientInfo field 20
message TelephonyInfoContainer {
  repeated TelephonyInfoEntry entries = 1;
}

// TelephonyInfoEntry
// Field 1 = string (Gaia ID), Field 2 = enum (state), Field 3 = Timestamp (hqbb)
message TelephonyInfoEntry {
  string gaia_id = 1;         // Google Account ID e.g. "116253767460812011076"
  int32 state = 2;            // Enum, value=1 in captures
  Timestamp timestamp = 3;    // hqbb: { int64 seconds, int32 nanos }
}

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

// DeviceSignals in ClientInfo
