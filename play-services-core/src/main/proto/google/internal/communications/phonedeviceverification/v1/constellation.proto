// The telephony information of the client which is used to choose a right challenge for this client based on policies. Next ID: 27
message TelephonyInfo {
  // getPhoneType() - 2: GSM→1, CDMA→2, SIP→3
  int32 phone_type = 1;

  // getGroupIdLevel1()
  string group_id_level1 = 2;

  MobileOperatorCountry sim_country = 3;
  MobileOperatorCountry network_country = 4;

  // TelephonyManager.isNetworkRoaming(): not→1, roaming→2
  int32 data_roaming = 5;

  // ConnectivityManager.activeNetworkInfo.isRoaming(): null→0, not→1, roaming→2
  int32 network_roaming = 6;

  // SMS perms + isSmsCapable + DISALLOW_SMS: no_perms→1, restricted→4, not_capable→1, capable→2
  int32 sms_capability = 7;

  int32 subscription_count = 8;
  int32 subscription_count_max = 9;

  // getIccAuthentication method exists: yes→2, no→1
  int32 eap_aka_capability = 11;

  // SEND_SMS_NO_CONFIRMATION permission: granted→2, not→1
  int32 sms_no_confirm_capability = 12;

  // getSimState(): READY→2, else→1
  int32 sim_state = 13;

  // getImei() / getMeid(), conditional on Phenotype flag
  optional string imei = 15;

  // ServiceState: IN_SERVICE→1, OUT_OF_SERVICE→2, EMERGENCY_ONLY→3, POWER_OFF→4
  int32 service_state = 16;

  // Conditional on Phenotype flags - microG omits (correct)
  repeated TelephonyCapabilityInfo capability_infos = 17;
  repeated TelephonyStateInfo state_infos = 18;
  repeated TelephonyPermissionInfo permission_infos = 19;
  repeated TelephonyDetailedInfo detailed_infos = 20;

  bool is_embedded = 21;

  // Conditional: set to 1 when EAP-AKA capable + Phenotype flag
  int32 unknown_field_23 = 23;

  // getSimCarrierId() as long
  int64 sim_carrier_id = 25;
